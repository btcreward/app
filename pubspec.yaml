name: bitcoin_cloud_mining
description: BTC Reward - A Reward-Based Simulation Game
publish_to: 'none'
version: 2.0.0+10

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  animated_text_kit: ^4.2.2
  app_links: ^6.4.0
  audioplayers: ^6.5.0
  battery_plus: ^6.2.2
  clipboard: ^0.1.3
  confetti: ^0.8.0
  connectivity_plus: ^6.1.4
  country_picker: ^2.0.19
  crypto: ^3.0.3
  csv: ^6.0.0
  cupertino_icons: ^1.0.2
  decimal: ^3.2.4
  device_info_plus: ^11.3.0
  dio: ^5.4.0
  firebase_analytics: ^11.3.3
  firebase_auth: ^5.3.3
  firebase_core: ^3.14.0
  firebase_crashlytics: ^4.3.7
  firebase_messaging: ^15.2.7
  firebase_remote_config: ^5.4.5
  fl_chart: ^1.0.0
  flutter_animate: ^4.5.0
  flutter_isolate: ^2.0.4
  flutter_local_notifications: ^19.3.0
  flutter_markdown: ^0.7.6+2
  flutter_native_splash: ^2.3.10
  flutter_secure_storage: ^9.0.0
  flutter_svg: ^2.0.9
  fluttertoast: ^8.2.4
  font_awesome_flutter: ^10.6.0
  google_fonts: ^6.1.0
  google_mobile_ads: ^6.0.0
  google_sign_in: ^5.4.4
  http: ^1.1.0
  image_picker: ^1.0.7
  intl: ^0.20.2
  local_auth: ^2.1.7
  mailer: ^6.0.1
  package_info_plus: ^8.3.0
  percent_indicator: ^4.2.3
  permission_handler: ^12.0.0+1
  provider: ^6.1.4
  qr_flutter: ^4.1.0
  rxdart: ^0.28.0
  share_plus: ^11.0.0
  shared_preferences: ^2.2.2
  shimmer: ^3.0.0
  socket_io_client: ^3.1.2
  speech_to_text: ^7.0.0
  timeago: ^3.5.0
  unity_ads_plugin: ^0.3.26
  url_launcher: ^6.2.2
  uuid: ^4.3.3
  window_manager: ^0.5.0
  workmanager: ^0.7.0

  # Optional: Additional mediation support packages
  # Uncomment these if you want to add more ad networks
  # facebook_audience_network: ^0.4.0 # Facebook Audience Network
  # applovin_max: ^3.5.0 # AppLovin MAX
  # ironsource_mediation: ^7.0.0 # IronSource

dev_dependencies:
  custom_lint: ^0.7.5
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_logo.png"
  web:
    generate: true
    image_path: "assets/images/app_logo.png"
    background_color: "#000000"
    theme_color: "#000000"
  windows:
    generate: true
    image_path: "assets/images/app_logo.png"
    icon_size: 48

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/
    - assets/sounds/
    - assets/images/app_logo.png
    - assets/images/google_logo.svg
    # Explicit sound files
    - assets/sounds/success_chime.mp3
    - assets/sounds/earning_notification.mp3
    - assets/sounds/notification_alert.mp3
    - assets/sounds/power_up_sound.wav

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

flutter_native_splash:
  color: "#000000"
  image: assets/images/app_logo.png
  branding: assets/images/app_logo.png
  color_dark: "#000000"
  image_dark: assets/images/app_logo.png
  branding_dark: assets/images/app_logo.png

  android_12:
    image: assets/images/app_logo.png
    icon_background_color: "#000000"
    image_dark: assets/images/app_logo.png
    icon_background_color_dark: "#000000"

  web: false
  ios: true
  android: true

  fullscreen: true
  android_gravity: center
  ios_content_mode: center
